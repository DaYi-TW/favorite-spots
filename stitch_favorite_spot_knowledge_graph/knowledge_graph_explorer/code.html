<!DOCTYPE html>

<style>
        .glass-panel {
            background: rgba(245, 246, 247, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .node-pulse {
            position: relative;
        }
        .node-pulse::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 9999px;
            background: rgba(75, 63, 226, 0.2);
            z-index: -1;
        }

<style>

<body class="bg-surface text-on-surface font-body h-screen w-full overflow-hidden flex flex-col relative">
<!-- Top Navigation / Search -->
<header class="fixed top-0 left-0 w-full z-40 p-6 pointer-events-none flex justify-between items-start">
<div class="pointer-events-auto w-full max-w-md">
<div class="bg-surface-container-lowest rounded-full shadow-[0_8px_30px_rgba(44,47,48,0.06)] flex items-center p-3 relative">
<span class="material-symbols-outlined text-on-surface-variant ml-2 mr-3" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface font-body w-full placeholder:text-on-surface-variant outline-none" placeholder="Find in Graph" type="text"/>
</div>
</div>
<!-- Legend -->
<div class="pointer-events-auto hidden md:flex flex-col bg-surface-container-lowest/80 backdrop-blur-md rounded-xl p-4 shadow-[0_8px_30px_rgba(44,47,48,0.06)] ml-4">
<h3 class="font-headline font-bold text-sm text-on-surface mb-3">Legend</h3>
<div class="flex flex-col gap-2">
<div class="flex items-center gap-2">
<div class="w-4 h-4 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[10px] text-on-primary">location_on</span>
</div>
<span class="text-xs font-label text-on-surface-variant">Spot</span>
</div>
<div class="flex items-center gap-2">
<div class="w-4 h-4 rounded-full bg-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-[10px] text-on-secondary">tag</span>
</div>
<span class="text-xs font-label text-on-surface-variant">Tag</span>
</div>
<div class="flex items-center gap-2">
<div class="w-4 h-4 rounded-full bg-tertiary flex items-center justify-center">
<span class="material-symbols-outlined text-[10px] text-on-tertiary">map</span>
</div>
<span class="text-xs font-label text-on-surface-variant">Location</span>
</div>
</div>
</div>
</header>
<!-- Graph Canvas Area -->
<main class="flex-grow relative bg-surface-container-low overflow-hidden cursor-move">

<svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrowhead" markerheight="7" markerwidth="10" orient="auto" refx="9" refy="3.5">
<polygon fill="#abadae" opacity="0.5" points="0 0, 10 3.5, 0 7"></polygon>
</marker>
</defs>
<!-- Center to Top Right (Retro Cafe) -->
<path d="M 50% 50% Q 60% 40% 70% 30%" fill="none" marker-end="url(#arrowhead)" opacity="0.6" stroke="#abadae" stroke-dasharray="4 4" stroke-width="2"></path>
<text dy="-5" fill="#595c5d" font-family="Manrope" font-size="10" font-weight="600" text-anchor="middle" x="60%" y="40%">Similarity: Style</text>
<!-- Center to Bottom Left (Kyoto) -->
<path d="M 50% 50% Q 40% 60% 30% 75%" fill="none" opacity="0.4" stroke="#abadae" stroke-width="2"></path>
<text dy="-5" fill="#595c5d" font-family="Manrope" font-size="10" font-weight="600" text-anchor="middle" x="40%" y="62%">Location</text>
<!-- Center to Top Left (Specialty Coffee) -->
<path d="M 50% 50% Q 35% 45% 20% 35%" fill="none" opacity="0.5" stroke="#abadae" stroke-width="1.5"></path>
<!-- Center to Bottom Right (New Spot) -->
<path d="M 50% 50% Q 65% 65% 80% 70%" fill="none" opacity="0.5" stroke="#abadae" stroke-dasharray="2 6" stroke-width="2"></path>
<text dy="-5" fill="#595c5d" font-family="Manrope" font-size="10" font-weight="600" text-anchor="middle" x="65%" y="60%">Vibe</text>
</svg>
<!-- Nodes -->
<!-- Central Node: The Roastery -->

<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-primary-dim text-on-primary flex items-center justify-center shadow-[0_12px_40px_rgba(75,63,226,0.3)] node-pulse cursor-pointer hover:scale-105 transition-transform duration-300">

<span class="material-symbols-outlined absolute text-3xl font-light" data-icon="storefront">storefront</span>
</div>
<div class="mt-3 bg-surface-container-lowest px-4 py-1.5 rounded-full shadow-sm">
<span class="font-headline font-bold text-sm text-on-surface">The Roastery</span>
</div>
</div>
<!-- Node: Retro Cafe -->
<div class="absolute top-[30%] left-[70%] transform -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
<div class="w-16 h-16 rounded-full bg-surface-container-lowest border-2 border-primary/20 text-primary flex items-center justify-center shadow-sm cursor-pointer hover:scale-105 transition-transform duration-300">

<div class="mt-2 bg-surface/80 backdrop-blur px-3 py-1 rounded-full">
<span class="font-label font-semibold text-xs text-on-surface">Kyoto</span>
</div>
</div>
<!-- Node: Specialty Coffee (Tag) -->

<div class="w-12 h-12 rounded-full bg-secondary text-on-secondary flex items-center justify-center shadow-sm cursor-pointer hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-xl" data-icon="tag">tag</span>
</div>
<div class="mt-2 bg-surface/80 backdrop-blur px-3 py-1 rounded-full">
<span class="font-label font-semibold text-xs text-on-surface">Specialty Coffee</span>
</div>
</div>
<!-- Node: Minimalist Vibes -->
<div class="absolute top-[70%] left-[80%] transform -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center">
<div class="w-12 h-12 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center shadow-sm cursor-pointer hover:scale-105 transition-transform duration-300">

</a>

<a class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-10 h-10 rounded-full" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
</a>
<a class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-10 h-10 rounded-full" href="#">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</a>
<a class="bg-gradient-to-br from-primary to-primary-dim text-on-primary shadow-sm flex items-center justify-center w-10 h-10 rounded-full" href="#">
<span class="material-symbols-outlined" data-icon="hub">hub</span>
</a>
<a class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-10 h-10 rounded-full" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
