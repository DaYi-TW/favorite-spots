spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/favoritespot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
    neo4j:
      schema-generate: create
      repositories:
        enabled: false
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${SPRING_NEO4J_USERNAME:neo4j}
      password: ${SPRING_NEO4J_PASSWORD:favoritespot}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  web:
    resources:
      static-locations: file:${UPLOAD_DIR:/app/uploads}/,classpath:/static/
      add-mappings: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}
    expiration-ms: 86400000  # 24 hours
  anthropic:
    api-key: ${ANTHROPIC_FOUNDRY_API_KEY:dummy}
    base-url: ${ANTHROPIC_BASE_URL:https://aic-claude-eus2.openai.azure.com}
    opus-model: ${ANTHROPIC_DEFAULT_OPUS_MODEL:claude-opus-4-7}
    sonnet-model: ${ANTHROPIC_DEFAULT_SONNET_MODEL:claude-sonnet-4-6}
  parse-cache:
    ttl-seconds: 86400  # 24 hours
  neo4j:
    enabled: ${NEO4J_ENABLED:true}
  upload:
    dir: ${UPLOAD_DIR:/app/uploads}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080/uploads}
